services:
  app:
    build: .
    ports:
      - '8081:8081'
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/addresses
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8081

  db:
    image: postgres:17
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: addresses
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d addresses"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init/01-addresses.sql:/docker-entrypoint-initdb.d/01-addresses.sql:ro

volumes:
  db_data:
